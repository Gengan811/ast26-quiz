author: Gengan811
date: '2026-05-05'
question: |
  某工程師為兩台 ext4 伺服器設定了不同的日誌模式：伺服器 X 使用 Ordered Journaling，伺服器 Y 使用 Writeback Journaling。某天機房遭遇瞬間停電，當時兩台伺服器都正好在處理一筆 append 寫入，且真正的 Data blocks 都還暫存在記憶體（Page Cache）中，尚未寫入實體磁碟。
  
  請問在重開機並完成 journal replay 後，這兩種模式對檔案狀態與資安的影響為何？
options:
  - text: "伺服器 X 會因 Data 尚未寫入而阻止 Metadata 進入 journal，重開機後僅遺失本次更新，檔案保持舊貌。伺服器 Y 則可能已將 Metadata 成功 Commit，重開機 replay 會將 inode 指向未更新的磁碟區塊，導致讀出殘留的 garbage data，引發嚴重的機密外洩。"
    correct: true
    explanation: |
      這是正確的。Ordered Journaling 強制「Data 必須先於 Metadata 寫入硬碟」，既然 Data 還在記憶體，Metadata 就絕對還沒 Commit，因此重開機後就像沒發生過一樣（僅遺失新資料）。Writeback Journaling 則不管 Data，可能已將 Metadata 成功 Commit，導致重開機後 inode 變大並指向舊有區塊，產生讀到別人舊資料的嚴重資安漏洞。
  - text: "伺服器 X 的日誌會強制記錄 Data 的寫入意圖，重開機後雖資料遺失，但會自動以零值填滿該區塊以防止洩漏。伺服器 Y 則因缺乏順序保證，其 journal replay 會因找不到對應的 Data block 而宣告系統損毀，必須強制執行全盤 fsck 才能順利掛載檔案系統。"
    explanation: |
      這是對日誌機制的誤解。Ordered Journaling 並不會有「自動補零」的安全機制，它純粹靠寫入順序來防禦。此外，Writeback Journaling 重開機時只會盲目信任 journal 中的 Metadata 進行 replay，根本不知道 Data 遺失了，因此不會報錯，更不會強制觸發耗時的全盤 fsck 掃描。
  - text: "伺服器 X 與伺服器 Y 都會發生嚴重的 space leak 。因為兩者都是僅記錄 Metadata 的模式，當記憶體中的 Data 遺失時，日誌中殘留的 inode 變更會讓系統誤以為磁碟區塊已被佔用。兩台伺服器的檔案大小都會隨之增加，但內容全部都會是無法解析的亂碼。"
    explanation: |
      這個選項沒有區分出兩種模式的本質差異。伺服器 X（Ordered）因為寫入順序的強制性，Metadata 根本還沒寫入 journal，所以絕對不會發生檔案變大或 space leak 的情況。只有伺服器 Y（Writeback）會因為 Metadata 提早 Commit 而產生檔案變大與 garbage data 的問題。
  - text: "伺服器 X 因為嚴格的排序規則，會觸發自動 checkpoint 機制將記憶體資料緊急刷入硬碟，因此能完美保留新資料。伺服器 Y 則會直接捨棄整筆 transaction ，將 inode 與 bitmap 恢復到斷電前的狀態，兩者都不會產生 garbage data 或影響資安。"
    explanation: |
      這是完全違反物理定律的錯誤推論。當硬碟失去電力時，沒有任何檔案系統（包含 Ordered Journaling）能夠憑空將 RAM 中的資料「緊急刷入硬碟」。伺服器 X 保障安全的方式是讓這筆交易失效（捨棄 Metadata），而不是奇蹟般地救回記憶體中的 Data。
